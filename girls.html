<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TINOS CUP — Κορίτσια (Girls)</title>
  <meta name="description" content="Tinos Cup — Κορίτσια: αποτελέσματα, βαθμολογία και πρόγραμμα αγώνων." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script>document.write('<link rel="stylesheet" href="css/styles.css?v=' + Date.now() + '">');</script>
  <noscript><link rel="stylesheet" href="css/styles.css" /></noscript>
</head>
<body>
  <div class="app">

    <!-- ============================ HEADER ============================ -->
    <header class="masthead">
      <a class="brand-logo" href="index.html" title="Αρχική">
        <img src="logos/tinos-cup-mark.png" alt="TINOS CUP" />
      </a>

      <div class="title-block">
        <img class="title-img" src="logos/tinos-cup-title.png" alt="TINOS CUP — Football Tournament" />
      </div>

      <div class="category-badge" id="categoryBadge"></div>
    </header>

    <!-- ============================ LAYOUT ============================ -->
    <div class="layout">

      <!-- Sidebar: Περίοδοι -->
      <aside class="sidebar panel">
        <div class="panel-title">ΠΕΡΙΟΔΟΙ</div>
        <div class="period-list" id="periodList"></div>
      </aside>

      <!-- Content: tabs + δυναμικό περιεχόμενο -->
      <div class="content">
        <div class="filterbar">
          <div class="filter-group">
            <span class="filter-cap">ΣΕΛΙΔΑ</span>
            <div class="seg page-nav">
              <a class="seg-btn" href="boys.html"><span class="seg-ic">♂</span>ΑΓΟΡΙΑ</a>
              <a class="seg-btn active" href="girls.html"><span class="seg-ic">♀</span>ΚΟΡΙΤΣΙΑ</a>
            </div>
          </div>
          <div class="filter-group">
            <span class="filter-cap">ΗΛΙΚΙΑ</span>
            <div class="seg seg-ages" id="ageSwitch"></div>
          </div>
        </div>
        <div class="tabs" id="tabs"></div>
        <div id="mainArea"></div>
      </div>
    </div>

    <!-- ============================ FOOTER ============================ -->
    <footer class="tfooter">
      <div class="slogan">Η ΤΗΝΟΣ ΠΑΙΖΕΙ ΜΠΑΛΑ</div>
      <span class="hash">#TINOSCUP</span>
    </footer>

  </div>

  <script>window.TINOS_GENDER = "GIRLS";</script>
  <script>
    // cache-busting: φόρτωσε πάντα την τελευταία έκδοση (ώστε αλλαγές/σκορ να φαίνονται αμέσως)
    (function () {
      var v = "?v=" + Date.now();
      ["js/data.js", "js/standings.js", "js/app.js"].forEach(function (s) {
        document.write('<script src="' + s + v + '"><\/script>');
      });
    })();
  </script>
</body>
</html>
